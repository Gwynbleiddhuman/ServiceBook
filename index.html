<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceBook Pro</title>
    <meta name="theme-color" content="#0d6efd">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary: #0d6efd; --bg: #f4f7fb; }
        body { background-color: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; }
        .container-custom { max-width: 1100px; margin: 20px auto; background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 25px; }
        .card-dashboard { background: #f8fafd; border-radius: 20px; padding: 20px; border: 1px solid rgba(0,0,0,0.03); transition: 0.3s; }
        .stats-number { font-size: 2rem; font-weight: 800; color: #1e293b; }
        .fab-button { position: fixed; bottom: 25px; right: 25px; border-radius: 50px; padding: 15px 25px; box-shadow: 0 10px 20px rgba(13,110,253,0.3); z-index: 1000; }
        #authSection { background: #edf2ff; padding: 6px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; }
        .btn-ocr { background: #f1f5f9; border: 1px dashed #cbd5e1; color: #64748b; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>

<div class="container-custom">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
        <div class="d-flex align-items-center gap-2">
            <div class="bg-primary text-white p-3 rounded-4"><i class="fas fa-car fa-lg"></i></div>
            <div>
                <h4 class="mb-0" id="carDisplay">Загрузка...</h4>
                <div id="carDetails" class="small text-muted">Сведения об авто</div>
            </div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div id="authSection">
                <span id="userDisplayName" class="small fw-bold"></span>
                <button class="btn btn-sm btn-primary rounded-pill" id="loginButton" data-bs-toggle="modal" data-bs-target="#loginModal">Войти</button>
                <button class="btn btn-sm btn-light rounded-pill" id="logoutBtn" style="display:none">Выйти</button>
            </div>
            <button class="btn btn-dark btn-sm rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#editCarModal">⚙️</button>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card-dashboard">
                <div class="text-muted small text-uppercase fw-bold mb-1">Текущий пробег</div>
                <div class="stats-number"><span id="currentMileageDisplay">0</span> <small class="fs-6 fw-normal">км</small></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-dashboard">
                <div class="text-muted small text-uppercase fw-bold mb-1">Затраты (всего)</div>
                <div class="stats-number" id="totalCosts">0 ₽</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-dashboard">
                <div class="text-muted small text-uppercase fw-bold mb-1">Прогноз ТО</div>
                <div id="serviceForecast" class="stats-number fs-4">—</div>
                <div class="small text-muted mt-2" id="daysToService">Мало данных для расчета</div>
            </div>
        </div>
    </div>

    <ul class="nav nav-pills mb-4 bg-light p-1 rounded-4" id="pills-tab" role="tablist">
        <li class="nav-item flex-fill"><button class="nav-link active w-100 rounded-4" data-bs-toggle="tab" data-bs-target="#tab-fuel">⛽ Заправки</button></li>
        <li class="nav-item flex-fill"><button class="nav-link w-100 rounded-4" data-bs-toggle="tab" data-bs-target="#tab-service">🔧 Сервис</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-fuel"><div id="fuelingsList" class="list-group list-group-flush"></div></div>
        <div class="tab-pane fade" id="tab-service"><div id="servicesList" class="list-group list-group-flush"></div></div>
    </div>
</div>

<div class="modal fade" id="addFuelingModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 rounded-4"><div class="modal-body p-4">
    <h5 class="mb-4 fw-bold">Добавить заправку</h5>
    <div class="btn-ocr" id="fakeOcr"><i class="fas fa-camera me-2"></i> Сканировать чек (бета)</div>
    <div class="row g-2">
        <div class="col-6"><label class="small text-muted">Дата</label><input type="date" id="fuelDate" class="form-control" value="2026-03-20"></div>
        <div class="col-6"><label class="small text-muted">Пробег</label><input type="number" id="fuelMileage" class="form-control" placeholder="0"></div>
        <div class="col-6"><label class="small text-muted">Литров</label><input type="number" id="fuelLiters" class="form-control" step="0.1"></div>
        <div class="col-6"><label class="small text-muted">Цена за л.</label><input type="number" id="fuelPrice" class="form-control" step="0.1"></div>
    </div>
    <button class="btn btn-primary w-100 mt-4 py-3 rounded-3 fw-bold" id="saveFuelingBtn">Сохранить</button>
</div></div></div></div>

<div class="modal fade" id="loginModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content rounded-4"><div class="modal-body p-4 text-center">
    <h5 class="fw-bold mb-4">Вход в систему</h5>
    <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email">
    <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Пароль">
    <button class="btn btn-primary w-100 rounded-pill py-2" id="loginBtn">Войти</button>
</div></div></div></div>

<button class="btn btn-primary fab-button" data-bs-toggle="modal" data-bs-target="#addFuelingModal"><i class="fas fa-plus me-2"></i> Заправка</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'firebase/auth';
    import { getFirestore, doc, setDoc, getDoc } from 'firebase/firestore';

    const firebaseConfig = {
        apiKey: "AIzaSyAcYMr_VmmeZm0f_SJo4plm-wOAmhKuZpU",
        authDomain: "servicecarbook.firebaseapp.com",
        projectId: "servicecarbook",
        storageBucket: "servicecarbook.firebasestorage.app",
        messagingSenderId: "321524196690",
        appId: "1:321524196690:web:4d3fe9df49b4ed2cc3068b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let appState = { car: { makeModel: '', currentMileage: 0 }, services: [], fuelings: [] };
    let currentUser = null;

    async function save() {
        if (currentUser) await setDoc(doc(db, 'userData', currentUser.uid), appState);
        else localStorage.setItem('carServiceBook', JSON.stringify(appState));
        updateUI();
    }

    function updateUI() {
        document.getElementById('carDisplay').innerText = appState.car.makeModel || 'Мой автомобиль';
        document.getElementById('currentMileageDisplay').innerText = appState.car.currentMileage.toLocaleString();
        
        const total = [...appState.services, ...appState.fuelings].reduce((acc, cur) => acc + (cur.cost || cur.totalCost || 0), 0);
        document.getElementById('totalCosts').innerText = total.toLocaleString() + ' ₽';
        
        // Прогноз ТО (математический)
        if (appState.fuelings.length > 1) {
            const sorted = [...appState.fuelings].sort((a,b) => new Date(a.date) - new Date(b.date));
            const diffDays = (new Date(sorted[sorted.length-1].date) - new Date(sorted[0].date)) / (1000*3600*24) || 1;
            const kmDay = (sorted[sorted.length-1].mileage - sorted[0].mileage) / diffDays;
            if (kmDay > 0) {
                const left = 10000 - (appState.car.currentMileage % 10000);
                const days = Math.round(left / kmDay);
                const d = new Date(); d.setDate(d.getDate() + days);
                document.getElementById('serviceForecast').innerText = d.toLocaleDateString();
                document.getElementById('daysToService').innerText = `Примерно через ${days} дн.`;
            }
        }
        render();
    }

    function render() {
        const list = document.getElementById('fuelingsList');
        list.innerHTML = appState.fuelings.map(f => `<div class="list-group-item d-flex justify-content-between align-items-center py-3">
            <div><b>${f.date}</b><br><small>${f.mileage} км</small></div>
            <div class="text-primary fw-bold">${f.totalCost} ₽</div>
        </div>`).join('');
    }

    document.getElementById('saveFuelingBtn').onclick = () => {
        const m = parseInt(document.getElementById('fuelMileage').value);
        if (m > appState.car.currentMileage) appState.car.currentMileage = m;
        const l = parseFloat(document.getElementById('fuelLiters').value) || 0;
        const p = parseFloat(document.getElementById('fuelPrice').value) || 0;
        appState.fuelings.push({ id: Date.now(), date: document.getElementById('fuelDate').value, mileage: m, totalCost: l * p });
        save();
        bootstrap.Modal.getInstance(document.getElementById('addFuelingModal')).hide();
    };

    document.getElementById('loginBtn').onclick = async () => {
        await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('loginButton').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('userDisplayName').innerText = user.email.split('@')[0];
            const snap = await getDoc(doc(db, 'userData', user.uid));
            if (snap.exists()) appState = snap.data();
        } else {
            const s = localStorage.getItem('carServiceBook');
            if (s) appState = JSON.parse(s);
        }
        updateUI();
    });
</script>
</body>
</html>
