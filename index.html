<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Сервисная Книжка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen">

    <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white px-6 py-3 rounded shadow-lg hidden z-50 transition-all">
        <span id="toast-msg">Сообщение</span>
    </div>

    <div id="auth-view" class="min-h-screen flex items-center justify-center fade-in">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
            <div class="text-center mb-6">
                <i class="fas fa-car-wrench text-blue-600 text-4xl mb-2"></i>
                <h1 class="text-2xl font-bold text-gray-800">Сервисная Книжка</h1>
            </div>

            <div class="flex mb-4">
                <button id="tab-login" class="flex-1 pb-2 border-b-2 border-blue-600 text-blue-600 font-semibold">Вход</button>
                <button id="tab-register" class="flex-1 pb-2 border-b-2 border-transparent text-gray-500 font-semibold">Регистрация</button>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="login-email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Пароль</label>
                    <input type="password" id="login-password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition">Войти</button>
            </form>

            <form id="register-form" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Никнейм</label>
                    <input type="text" id="reg-name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="reg-email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Пароль (мин. 6 символов)</label>
                    <input type="password" id="reg-password" required minlength="6" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-green-600 text-white p-2 rounded-md hover:bg-green-700 transition">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden fade-in pb-10">
        <nav class="bg-blue-600 text-white shadow-md">
            <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2 text-xl font-bold">
                    <i class="fas fa-car-side"></i> Гараж
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-display-name" class="font-medium"></span>
                    <button id="logout-btn" class="bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded transition text-sm">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-1 space-y-6">
                <div class="bg-white rounded-xl shadow-sm p-5 border-t-4 border-blue-500">
                    <h3 class="text-gray-500 text-sm font-semibold uppercase tracking-wider mb-2">Всего расходов</h3>
                    <p class="text-3xl font-bold text-gray-800" id="total-cost">0 ₽</p>
                    <p class="text-sm text-gray-500 mt-2">Записей: <span id="total-records">0</span></p>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-5">
                    <h2 class="text-lg font-bold border-b pb-2 mb-4">Новая запись ТО</h2>
                    <form id="record-form" class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-600">Дата</label>
                            <input type="date" id="rec-date" required class="w-full border rounded p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">Пробег (км)</label>
                            <input type="number" id="rec-mileage" required class="w-full border rounded p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">Категория</label>
                            <select id="rec-type" class="w-full border rounded p-2 text-sm">
                                <option value="Масло и фильтры">Масло и фильтры</option>
                                <option value="Ходовая часть">Ходовая часть</option>
                                <option value="Двигатель">Двигатель</option>
                                <option value="Шиномонтаж">Шиномонтаж</option>
                                <option value="Электрика">Электрика</option>
                                <option value="Другое">Другое</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">Стоимость (₽)</label>
                            <input type="number" id="rec-cost" required class="w-full border rounded p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">Описание / Запчасти</label>
                            <textarea id="rec-notes" rows="2" class="w-full border rounded p-2 text-sm" placeholder="Например: Масло 5W-40, фильтр MANN"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded shadow hover:bg-blue-700 transition">
                            <i class="fas fa-plus"></i> Добавить
                        </button>
                    </form>
                </div>
            </div>

            <div class="md:col-span-2">
                <div class="bg-white rounded-xl shadow-sm p-5 min-h-[500px]">
                    <h2 class="text-xl font-bold border-b pb-3 mb-4"><i class="fas fa-history text-blue-500"></i> История обслуживания</h2>
                    
                    <div id="records-list" class="space-y-4">
                        <div class="text-center text-gray-400 py-10" id="empty-state">
                            <i class="fas fa-clipboard-list text-4xl mb-3"></i>
                            <p>Записей пока нет. Добавьте первое ТО.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } 
               from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc } 
               from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // ==============================================================================
        // ВНИМАНИЕ! ВСТАВЬТЕ СЮДА ВАШИ ДАННЫЕ FIREBASE ИЗ КОНСОЛИ
        // ==============================================================================
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_PROJECT_ID.firebaseapp.com",
            projectId: "ВАШ_PROJECT_ID",
            storageBucket: "ВАШ_PROJECT_ID.appspot.com",
            messagingSenderId: "ВАШ_SENDER_ID",
            appId: "ВАШ_APP_ID"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Элементы
        const authView = document.getElementById('auth-view');
        const appView = document.getElementById('app-view');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const formLogin = document.getElementById('login-form');
        const formRegister = document.getElementById('register-form');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        // Переключение вкладок Вход/Регистрация
        tabLogin.onclick = () => {
            formLogin.classList.remove('hidden');
            formRegister.classList.add('hidden');
            tabLogin.classList.add('border-blue-600', 'text-blue-600');
            tabLogin.classList.remove('border-transparent', 'text-gray-500');
            tabRegister.classList.remove('border-blue-600', 'text-blue-600');
            tabRegister.classList.add('border-transparent', 'text-gray-500');
        };
        tabRegister.onclick = () => {
            formRegister.classList.remove('hidden');
            formLogin.classList.add('hidden');
            tabRegister.classList.add('border-blue-600', 'text-blue-600');
            tabRegister.classList.remove('border-transparent', 'text-gray-500');
            tabLogin.classList.remove('border-blue-600', 'text-blue-600');
            tabLogin.classList.add('border-transparent', 'text-gray-500');
        };

        // Функция уведомлений
        function showToast(message, type = 'success') {
            toastMsg.innerText = message;
            toast.className = `fixed top-5 right-5 px-6 py-3 rounded shadow-lg z-50 transition-all ${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // Авторизация
        formLogin.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showToast('Успешный вход!');
            } catch (error) {
                showToast(error.message, 'error');
            }
        };

        // Регистрация
        formRegister.onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCredential.user, { displayName: name });
                showToast('Аккаунт создан!');
            } catch (error) {
                showToast(error.message, 'error');
            }
        };

        // Выход
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Отслеживание состояния пользователя
        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authView.classList.add('hidden');
                appView.classList.remove('hidden');
                document.getElementById('user-display-name').innerText = user.displayName || user.email;
                
                // Ставим сегодняшнюю дату по умолчанию
                document.getElementById('rec-date').valueAsDate = new Date();
                
                loadRecords(); // Загрузка данных из БД
            } else {
                currentUser = null;
                appView.classList.add('hidden');
                authView.classList.remove('hidden');
            }
        });

        // Функция получения иконки по категории
        function getCategoryIcon(type) {
            const icons = {
                'Масло и фильтры': 'fa-oil-can text-yellow-500',
                'Ходовая часть': 'fa-cogs text-gray-500',
                'Двигатель': 'fa-car-battery text-red-500',
                'Шиномонтаж': 'fa-compact-disc text-blue-500',
                'Электрика': 'fa-plug text-purple-500',
                'Другое': 'fa-wrench text-green-500'
            };
            return icons[type] || icons['Другое'];
        }

        // Загрузка записей из Firestore
        async function loadRecords() {
            if (!currentUser) return;
            const recordsList = document.getElementById('records-list');
            const emptyState = document.getElementById('empty-state');
            
            try {
                const q = query(
                    collection(db, "serviceRecords"), 
                    where("userId", "==", currentUser.uid),
                    orderBy("date", "desc") // Сортировка от новых к старым
                );
                
                const querySnapshot = await getDocs(q);
                recordsList.innerHTML = '';
                
                let totalCost = 0;
                let count = 0;

                if (querySnapshot.empty) {
                    recordsList.appendChild(emptyState);
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        totalCost += Number(data.cost);
                        count++;
                        
                        // Создание карточки записи
                        const div = document.createElement('div');
                        div.className = "border rounded-lg p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50 hover:bg-gray-100 transition";
                        div.innerHTML = `
                            <div class="flex items-center gap-4 mb-2 sm:mb-0">
                                <div class="bg-white p-3 rounded-full shadow-sm">
                                    <i class="fas ${getCategoryIcon(data.type)} text-xl"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800">${data.type}</h4>
                                    <p class="text-xs text-gray-500"><i class="far fa-calendar-alt"></i> ${data.date} | <i class="fas fa-tachometer-alt"></i> ${data.mileage} км</p>
                                    ${data.notes ? `<p class="text-sm text-gray-600 mt-1 italic">${data.notes}</p>` : ''}
                                </div>
                            </div>
                            <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end border-t sm:border-0 pt-2 sm:pt-0">
                                <span class="font-bold text-lg text-gray-800">${data.cost} ₽</span>
                                <button class="text-red-400 hover:text-red-600 transition p-2 delete-btn" data-id="${doc.id}">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        `;
                        recordsList.appendChild(div);
                    });
                }

                // Обновление статистики
                document.getElementById('total-cost').innerText = `${totalCost.toLocaleString('ru-RU')} ₽`;
                document.getElementById('total-records').innerText = count;

                // Навешиваем обработчики на кнопки удаления
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.onclick = async (e) => {
                        const id = e.currentTarget.getAttribute('data-id');
                        if(confirm('Удалить эту запись?')) {
                            await deleteDoc(doc(db, "serviceRecords", id));
                            showToast('Запись удалена');
                            loadRecords();
                        }
                    }
                });

            } catch (error) {
                console.error("Ошибка загрузки:", error);
                // Если база не создана или индексы не настроены, покажем это
                if(error.message.includes('index')) {
                     alert("Для сортировки по дате Firebase требует создать индекс. Ссылка выведена в консоль браузера (F12).");
                }
            }
        }

        // Добавление новой записи
        document.getElementById('record-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Сохранение...';

            const record = {
                userId: currentUser.uid,
                date: document.getElementById('rec-date').value,
                mileage: parseInt(document.getElementById('rec-mileage').value),
                type: document.getElementById('rec-type').value,
                cost: parseFloat(document.getElementById('rec-cost').value),
                notes: document.getElementById('rec-notes').value,
                timestamp: new Date()
            };

            try {
                await addDoc(collection(db, "serviceRecords"), record);
                showToast('Запись успешно добавлена!');
                e.target.reset();
                document.getElementById('rec-date').valueAsDate = new Date(); // возвращаем дату
                loadRecords();
            } catch (error) {
                showToast('Ошибка: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-plus"></i> Добавить';
            }
        };
    </script>
</body>
</html>
