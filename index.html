<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Service Car Book - Сервисная книжка авто</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        .hidden { display: none !important; }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
        dialog::backdrop { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        dialog[open] { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        body {
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-20">

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl shadow-2xl hidden z-[100] text-white font-medium transition-all text-center min-w-[280px]"></div>

    <dialog id="confirmModal" class="p-0 rounded-2xl shadow-2xl w-[90%] max-w-sm m-auto top-1/2 -translate-y-1/2 border-none">
        <div class="p-6 text-center">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2 text-slate-800" id="confirm-title">Удаление</h3>
            <p class="text-slate-500 mb-6" id="confirm-text">Вы уверены, что хотите удалить эту запись?</p>
            <div class="flex gap-3">
                <button onclick="document.getElementById('confirmModal').close()" class="flex-1 bg-slate-100 p-3 rounded-xl font-semibold">Отмена</button>
                <button id="confirm-yes-btn" class="flex-1 bg-red-500 text-white p-3 rounded-xl font-bold shadow-lg shadow-red-200">Удалить</button>
            </div>
        </div>
    </dialog>

    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center gap-2">
            <div class="flex items-center gap-1.5 text-lg font-bold truncate">
                <i class="fas fa-car-side"></i> <span>Service Book</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="user-info" class="text-xs font-medium flex items-center gap-1">
                    <i class="fas fa-wifi text-red-300"></i> Гость
                </span>
                <button id="btn-auth-open" onclick="authModal.showModal()" class="bg-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold transition">Войти</button>
                <button id="btn-logout-trigger" class="bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition hidden">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 flex flex-wrap justify-between items-center gap-4 border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="bg-blue-100 p-4 rounded-full text-blue-600 text-2xl"><i class="fas fa-car"></i></div>
                <div>
                    <h2 class="text-2xl font-bold" id="display-car-name">Мой Автомобиль</h2>
                    <p class="text-slate-500 text-sm" id="display-car-details">Данные не заполнены</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase tracking-wide font-bold">Текущий пробег</p>
                <p class="text-2xl font-bold text-slate-800"><span id="display-mileage">0</span> <span class="text-sm text-slate-500">км</span></p>
                <button onclick="openCarModal()" class="text-blue-600 hover:underline text-sm mt-1 font-medium"><i class="fas fa-pen"></i> Изменить</button>
            </div>
        </div>

        <div class="flex overflow-x-auto border-b border-slate-200 mb-6 scrollbar-hide">
            <button class="tab-btn active px-4 py-3 text-slate-500 whitespace-nowrap" data-target="tab-dash"><i class="fas fa-chart-pie me-2"></i>Сводка</button>
            <button class="tab-btn px-4 py-3 text-slate-500 whitespace-nowrap" data-target="tab-service"><i class="fas fa-wrench me-2"></i>ТО</button>
            <button class="tab-btn px-4 py-3 text-slate-500 whitespace-nowrap" data-target="tab-tuning"><i class="fas fa-tools me-2"></i>Расходы</button>
            <button class="tab-btn px-4 py-3 text-slate-500 whitespace-nowrap" data-target="tab-fuel"><i class="fas fa-gas-pump me-2"></i>Заправки</button>
            <button class="tab-btn px-4 py-3 text-slate-500 whitespace-nowrap" data-target="tab-reminders"><i class="fas fa-bell me-2"></i>Напоминания</button>
            <button class="tab-btn px-4 py-3 text-slate-500 whitespace-nowrap" data-target="tab-stats"><i class="fas fa-chart-line me-2"></i>Статистика</button>
        </div>

        <div id="tab-dash" class="tab-content block space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-l-4 border-l-blue-500">
                    <p class="text-xs text-slate-400 uppercase font-bold">Расход</p>
                    <p class="text-2xl font-bold mt-1 text-slate-800" id="dash-avg-fuel">0</p>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-l-4 border-l-yellow-500">
                    <p class="text-xs text-slate-400 uppercase font-bold">Затраты</p>
                    <p class="text-2xl font-bold mt-1 text-slate-800"><span id="dash-total-cost">0</span> ₽</p>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-l-4 border-l-red-500">
                    <p class="text-xs text-slate-400 uppercase font-bold">Напоминания</p>
                    <p class="text-2xl font-bold mt-1 text-slate-800" id="dash-reminders-count">0</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="openServiceModal()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl shadow-lg font-bold active:scale-95 transition"><i class="fas fa-plus"></i> Запись ТО</button>
                <button onclick="openFuelModal()" class="flex-1 bg-emerald-600 text-white py-4 rounded-2xl shadow-lg font-bold active:scale-95 transition"><i class="fas fa-plus"></i> Заправка</button>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-lg mb-4 text-slate-800">Последние события</h3>
                <div id="dash-recent-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="tab-service" class="tab-content hidden"><div id="list-services" class="space-y-2"></div></div>
        <div id="tab-tuning" class="tab-content hidden"><div id="list-tuning" class="space-y-2"></div></div>
        <div id="tab-fuel" class="tab-content hidden"><div id="list-fuelings" class="space-y-2"></div></div>
        <div id="tab-reminders" class="tab-content hidden"><div id="list-reminders" class="space-y-2"></div></div>
        
        <div id="tab-stats" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm"><canvas id="chart-doughnut"></canvas></div>
                <div class="bg-white p-4 rounded-xl shadow-sm"><canvas id="chart-line"></canvas></div>
            </div>
            <div class="flex flex-col gap-4 items-center py-4">
                <button onclick="shareApp()" class="w-full max-w-sm bg-blue-50 text-blue-700 py-4 rounded-2xl font-bold border border-blue-100 flex items-center justify-center gap-2 active:scale-95 transition">
                    <i class="fas fa-share-nodes"></i> Поделиться приложением
                </button>
                <div class="flex gap-4">
                    <button onclick="exportData()" class="text-slate-400 text-sm">Экспорт JSON</button>
                    <button onclick="document.getElementById('import-file').click()" class="text-slate-400 text-sm">Импорт JSON</button>
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                </div>
            </div>
        </div>
    </div>

    <dialog id="authModal" class="p-0 rounded-2xl shadow-2xl w-[90%] max-w-sm m-auto top-1/2 -translate-y-1/2 border-none">
        <div class="p-6">
            <h3 class="text-xl font-bold mb-4">Авторизация</h3>
            <form id="form-auth" class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" autocomplete="off" class="w-full border p-4 rounded-xl bg-slate-50 outline-none focus:border-blue-500">
                <input type="password" id="auth-pass" placeholder="Пароль" autocomplete="off" class="w-full border p-4 rounded-xl bg-slate-50 outline-none focus:border-blue-500">
                <button type="button" id="btn-login-submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold active:scale-95 transition">Войти</button>
            </form>
            <button onclick="authModal.close()" class="w-full mt-4 text-slate-400 font-medium">Закрыть</button>
        </div>
    </dialog>

    <dialog id="carModal" class="p-0 rounded-2xl shadow-2xl w-[90%] max-w-md m-auto top-1/2 -translate-y-1/2 border-none">
        <div class="p-6">
            <h3 class="text-xl font-bold mb-4">Данные авто</h3>
            <form id="form-car" class="space-y-3">
                <input type="text" id="car-make" placeholder="Марка и модель" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50" required>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="car-year" placeholder="Год" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50">
                    <input type="text" id="car-plate" placeholder="Номер" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50">
                </div>
                <input type="number" id="car-mileage" placeholder="Текущий пробег (км)" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50" required>
                <div class="flex gap-2 mt-4">
                    <button type="button" onclick="carModal.close()" class="flex-1 bg-slate-100 p-3 rounded-xl font-medium">Отмена</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold">Сохранить</button>
                </div>
            </form>
        </div>
    </dialog>

    <dialog id="serviceModal" class="p-0 rounded-2xl shadow-2xl w-[90%] max-w-md m-auto top-1/2 -translate-y-1/2 border-none">
        <div class="p-6">
            <h3 class="text-xl font-bold mb-4">Запись о ТО</h3>
            <form id="form-service" class="space-y-3">
                <input type="hidden" id="srv-id">
                <input type="date" id="srv-date" class="w-full border p-3 rounded-xl bg-slate-50" required>
                <input type="text" id="srv-type" placeholder="Что сделали?" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50" required>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="srv-mileage" placeholder="Пробег" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50" required>
                    <input type="number" id="srv-cost" placeholder="Цена (₽)" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50" required>
                </div>
                <div class="flex gap-2 mt-4">
                    <button type="button" onclick="serviceModal.close()" class="flex-1 bg-slate-100 p-3 rounded-xl font-medium">Отмена</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold">Сохранить</button>
                </div>
            </form>
        </div>
    </dialog>

    <dialog id="fuelModal" class="p-0 rounded-2xl shadow-2xl w-[90%] max-w-md m-auto top-1/2 -translate-y-1/2 border-none">
        <div class="p-6">
            <h3 class="text-xl font-bold mb-4">Заправка</h3>
            <form id="form-fuel" class="space-y-3">
                <input type="hidden" id="fl-id">
                <input type="date" id="fl-date" class="w-full border p-3 rounded-xl bg-slate-50" required>
                <input type="number" id="fl-mileage" placeholder="Пробег (км)" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50" required>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" step="0.1" id="fl-liters" placeholder="Литры" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50" required>
                    <input type="number" id="fl-cost" placeholder="Сумма (₽)" autocomplete="off" class="w-full border p-3 rounded-xl bg-slate-50" required>
                </div>
                <div class="flex gap-2 mt-4">
                    <button type="button" onclick="fuelModal.close()" class="flex-1 bg-slate-100 p-3 rounded-xl font-medium">Отмена</button>
                    <button type="submit" class="flex-1 bg-emerald-600 text-white p-3 rounded-xl font-bold">Сохранить</button>
                </div>
            </form>
        </div>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcYMr_VmmeZm0f_SJo4plm-wOAmhKuZpU",
            authDomain: "servicecarbook.firebaseapp.com",
            projectId: "servicecarbook",
            storageBucket: "servicecarbook.firebasestorage.app",
            messagingSenderId: "321524196690",
            appId: "1:321524196690:web:4d3fe9df49b4ed2cc3068b",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let appState = { car: { make: '', year: '', plate: '', mileage: 0 }, services: [], tuning: [], fuelings: [], reminders: [] };
        let currentUser = null;

        // Внутренние уведомления
        window.showToast = (msg, type = 'success') => {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl shadow-2xl z-[100] text-white font-bold transition-all min-w-[280px] ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        };

        // Кастомное подтверждение (Убирает системный confirm)
        window.customConfirm = (title, text, onConfirm) => {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-text').innerText = text;
            const yesBtn = document.getElementById('confirm-yes-btn');
            const newBtn = yesBtn.cloneNode(true);
            yesBtn.parentNode.replaceChild(newBtn, yesBtn);
            newBtn.onclick = () => { onConfirm(); modal.close(); };
            modal.showModal();
        };

        // Удаление
        window.deleteItem = (collection, id) => {
            customConfirm('Удаление', 'Вы точно хотите удалить эту запись?', async () => {
                appState[collection] = appState[collection].filter(i => i.id !== id);
                await saveData();
            });
        };

        // Выход
        document.getElementById('btn-logout-trigger').onclick = () => {
            customConfirm('Выход', 'Выйти из аккаунта?', async () => {
                localStorage.removeItem('autoBookState');
                await signOut(auth);
                location.reload();
            });
        };

        // Шеринг без alert
        window.shareApp = async () => {
            if (navigator.share) {
                try { await navigator.share({ title: 'Service Book', text: 'Моя сервисная книжка!', url: location.origin }); } catch(e){}
            } else {
                navigator.clipboard.writeText(location.origin);
                showToast('Ссылка скопирована!');
            }
        };

        // Логика сохранения
        async function saveData() {
            localStorage.setItem('autoBookState', JSON.stringify(appState));
            if (currentUser) {
                try { await setDoc(doc(db, "userData", currentUser.uid), appState); } catch(e) {}
            }
            updateUI();
        }

        // Авторизация
        document.getElementById('btn-login-submit').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                authModal.close();
                showToast('Вход выполнен');
            } catch(e) { showToast('Ошибка входа', 'error'); }
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('user-info').innerText = user.email;
                document.getElementById('btn-auth-open').classList.add('hidden');
                document.getElementById('btn-logout-trigger').classList.remove('hidden');
                const docSnap = await getDoc(doc(db, "userData", user.uid));
                if (docSnap.exists()) appState = docSnap.data();
            } else {
                const local = localStorage.getItem('autoBookState');
                if (local) appState = JSON.parse(local);
            }
            updateUI();
        });

        // Табы
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(btn.dataset.target).classList.remove('hidden');
            };
        });

        // UI Update
        window.updateUI = () => {
            document.getElementById('display-car-name').innerText = appState.car.make || 'Мой Авто';
            document.getElementById('display-mileage').innerText = appState.car.mileage.toLocaleString();
            
            // Здесь добавьте рендер ваших списков (Services, Fuel и т.д.)
            const sList = document.getElementById('list-services');
            if (sList) sList.innerHTML = appState.services.map(s => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div><p class="font-bold">${s.type}</p><p class="text-xs text-slate-400">${s.date}</p></div>
                    <button onclick="deleteItem('services', ${s.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        };

        // Открытие форм
        window.openCarModal = () => carModal.showModal();
        window.openServiceModal = () => { document.getElementById('form-service').reset(); serviceModal.showModal(); };
        window.openFuelModal = () => { document.getElementById('form-fuel').reset(); fuelModal.showModal(); };

        // Сохранение форм
        document.getElementById('form-car').onsubmit = async (e) => {
            e.preventDefault();
            appState.car.make = document.getElementById('car-make').value;
            appState.car.mileage = Number(document.getElementById('car-mileage').value);
            await saveData();
            carModal.close();
        };

        document.getElementById('form-service').onsubmit = async (e) => {
            e.preventDefault();
            appState.services.push({
                id: Date.now(),
                date: document.getElementById('srv-date').value,
                type: document.getElementById('srv-type').value,
                cost: document.getElementById('srv-cost').value
            });
            await saveData();
            serviceModal.close();
        };
    </script>
</body>
</html>
